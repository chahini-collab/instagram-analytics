name: Atualizar Instagram

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  run-script:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. Checkout
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Setup R
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.3'

      # 3. Install + Run (MESMO PROCESSO 🔥)
      - name: Install packages and run script
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: |
          Rscript -e '
          options(repos = c(CRAN="https://cloud.r-project.org"))

          install.packages(c(
            "httr",
            "jsonlite",
            "dplyr",
            "readr"
          ), dependencies=TRUE)

          source("instagram_script.R")
          '

      # 4. Commit
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add instagram_posts.csv
          git commit -m "Atualizando dados automaticamente" || echo "Sem mudanças"
          git push
