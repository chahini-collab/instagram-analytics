name: Extrair Métricas do Instagram

on:
  schedule:
    # Executa todos os dias à meia-noite (00:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: # Permite acionar o workflow manualmente

jobs:
  extract_and_commit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do Repositório
      uses: actions/checkout@v4.1.7

    - name: Configurar R
      uses: r-lib/actions/setup-r@v2.8.0
      with:
        r-version: '4.3'
        use-public-rspm: true

    - name: Instalar Dependências do Sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4-openssl-dev libssl-dev

    - name: Instalar Pacotes R
      run: |
        install.packages(c('httr', 'jsonlite', 'dplyr'), repos='https://cloud.r-project.org')
      shell: Rscript {0}

    - name: Verificar Pacotes Instalados
      run: |
        Rscript -e "library('httr'); library('jsonlite'); library('dplyr'); cat('✓ Todos os pacotes instalados!\n')"

    - name: Executar Script R para Extrair Métricas
      env:
        INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
        INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
      run: Rscript extract_instagram_metrics.R

    - name: Configurar Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Adicionar e Commitar CSV
      run: |
        if [ -f instagram_metrics.csv ]; then
          git add instagram_metrics.csv
          git commit -m "Atualizar métricas do Instagram - $(date +'%Y-%m-%d %H:%M:%S') [skip ci]"
          git push
          echo "✓ CSV atualizado com sucesso!"
        else
          echo "✗ Erro: Arquivo CSV não foi gerado"
          exit 1
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
