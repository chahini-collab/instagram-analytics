name: Atualizar Instagram

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  run-script:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. Checkout
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Setup R
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.3'

      # 3. Instalar pacotes (SEPARADO 🔥)
      - name: Install R packages
        run: |
          Rscript -e '
          options(repos = c(CRAN="https://cloud.r-project.org"));
          install.packages(c("httr","jsonlite","dplyr","stringr"), dependencies=TRUE)
          '

      # 4. Rodar script
      - name: Run script
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: |
          Rscript instagram_script.R

      # 5. Commit
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add instagram_posts.csv
          git commit -m "Atualizando dados automaticamente" || echo "Sem mudanças"
          git push
