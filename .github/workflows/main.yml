name: Atualizar Instagram

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            httr
            jsonlite

      - name: Run script
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          echo "🔐 Testando token..."
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "❌ ACCESS_TOKEN vazio!"
            exit 1
          fi

          Rscript instagram_script.R

      - name: Commit updated file
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          # Verifica se o arquivo foi gerado
          if [ ! -f instagram_posts.csv ]; then
            echo "❌ Arquivo não gerado!"
            exit 1
          fi

          git add instagram_posts.csv

          # Só commit se houver mudança
          git diff --cached --quiet || git commit -m "Atualizando dados automaticamente"
          git push
