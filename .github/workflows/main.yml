name: Atualizar Instagram

on:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install packages
        run: |
          Rscript -e 'install.packages(c("httr","jsonlite","dplyr","readr"), repos="https://cloud.r-project.org")'

      - name: DEBUG ENV
        run: |
          echo "TOKEN LENGTH: ${#ACCESS_TOKEN}"
          echo "USER ID: $IG_USER_ID"
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}

      - name: Run script
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: |
          Rscript script.R
