name: Atualizar Instagram

on:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update

      - name: Install R packages (ROBUSTO)
        run: |
          Rscript -e '
          options(repos = c(CRAN = "https://cloud.r-project.org"));
          install.packages(c("httr","jsonlite","dplyr","readr"), dependencies=TRUE)
          '

      - name: Verify packages (DEBUG)
        run: |
          Rscript -e '
          library(httr);
          library(jsonlite);
          library(dplyr);
          library(readr);
          cat("✅ PACOTES OK\n")
          '

      - name: Run script
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: |
          echo "🚀 Executando script"
          Rscript instagram_script.R
