name: Atualizar Instagram

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Setup R
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.3'

      # 3. Instalar pacotes R (FORMA CORRETA)
      - name: Install packages
        run: |
          Rscript -e 'install.packages(c(
            "httr",
            "jsonlite",
            "dplyr",
            "readr",
            "lubridate"
          ), repos="https://cloud.r-project.org")'

      # 4. Verificação (DEBUG CRÍTICO)
      - name: Check packages
        run: |
          Rscript -e 'library(httr); library(jsonlite); cat("Pacotes OK\n")'

      # 5. Rodar script
      - name: Run script
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: Rscript instagram_script.R

      # 6. Commit automático
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add instagram_posts.csv
          git commit -m "Atualizando dados automaticamente" || echo "Sem mudanças"
          git push
