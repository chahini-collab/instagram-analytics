name: Atualizar Instagram

on:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      # 👇 ESSA É A MÁGICA (instala pacotes corretamente)
      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            httr
            jsonlite
            dplyr
            readr

      # 👇 DEBUG pra garantir
      - name: Test libraries
        run: |
          Rscript -e 'library(httr); library(jsonlite); library(dplyr); library(readr); cat("✅ PACOTES OK\n")'

      # 👇 EXECUÇÃO
      - name: Run script
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: |
          Rscript instagram_script.R
