name: Atualizar Instagram

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Setup R
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.3'

      # 3. LIMPAR CACHE DO R (🔥 ESSA É A CHAVE)
      - name: Clear R cache
        run: rm -rf ~/.cache/R

      # 4. Instalar pacotes (FORÇADO)
      - name: Install packages (FORCE)
        run: |
          Rscript -e '
          options(repos = c(CRAN="https://cloud.r-project.org"))
          install.packages("httr", dependencies=TRUE)
          install.packages("jsonlite", dependencies=TRUE)
          install.packages("dplyr", dependencies=TRUE)
          install.packages("readr", dependencies=TRUE)
          install.packages("lubridate", dependencies=TRUE)
          '

      # 5. TESTE REAL (se falhar aqui, você vê na hora)
      - name: Test packages
        run: |
          Rscript -e '
          library(httr)
          library(jsonlite)
          library(dplyr)
          cat("PACOTES OK\n")
          '

      # 6. Rodar script
      - name: Run script
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: Rscript instagram_script.R

      # 7. Commit
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add instagram_posts.csv
          git commit -m "Atualizando dados automaticamente" || echo "Sem mudanças"
          git push
