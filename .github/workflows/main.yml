name: Atualizar Instagram

on:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install packages
        run: |
          Rscript -e 'install.packages(c("httr","jsonlite","dplyr","readr"), repos="https://cloud.r-project.org")'

      - name: Run script
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: |
          echo "🔍 DEBUG ENV"
          echo "TOKEN: ${ACCESS_TOKEN:+OK}"
          echo "USER: $IG_USER_ID"

          Rscript script.R
